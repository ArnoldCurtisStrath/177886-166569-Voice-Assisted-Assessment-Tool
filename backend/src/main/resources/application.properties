# H2 in-memory database — for development, swap to PostgreSQL for production
spring.application.name=backend
spring.datasource.url=jdbc:h2:mem:voiceassess
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 web console at /h2-console
spring.h2.console.enabled=true

# Auto-create tables from entities on startup (update mode won't drop data)
spring.jpa.hibernate.ddl-auto=update

# Show SQL in logs for debugging
spring.jpa.show-sql=true
