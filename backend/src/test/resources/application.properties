# H2 in-memory — fast, disposable, perfect for tests
spring.datasource.url=jdbc:h2:mem:voiceassess_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Auto-create/drop tables in test — no Flyway needed
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.flyway.enabled=false

# Dummy Groq key — tests don't call the API
app.groq.api-key=dummy-test-key
