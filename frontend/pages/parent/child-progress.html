<!-- VoiceAssess — Student Progress (Parent View) -->
<div class="animate-fade-in">
  <!-- Student selector -->
  <div class="section-header">
    <span class="section-title" id="progress-student-name">Ethan Mwangi</span>
  </div>
  <p class="text-xs text-muted" style="margin-top: -12px; margin-bottom: var(--space-5);" id="progress-term">Term 2, 2026</p>

  <!-- Weekly Performance Chart -->
  <div class="card" style="margin-bottom: var(--space-5);">
    <div class="text-xs font-semibold text-secondary" style="text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: var(--space-3);">
      Weekly Performance
    </div>
    <div style="display: flex; align-items: flex-end; justify-content: space-between; height: 100px; padding: 0 var(--space-1);" id="weekly-chart">
      <!-- bars generated by JS -->
    </div>
    <div style="display: flex; justify-content: space-between; margin-top: var(--space-2);" id="week-labels">
      <!-- labels generated by JS -->
    </div>
  </div>

  <!-- Subject Breakdown -->
  <div style="margin-bottom: var(--space-5);">
    <div class="text-xs font-semibold text-secondary" style="text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: var(--space-3);">
      Subject Breakdown
    </div>
    <div style="display: flex; flex-direction: column; gap: var(--space-3);" id="subject-breakdown">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- Recent Assessments -->
  <div>
    <div class="text-xs font-semibold text-secondary" style="text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: var(--space-3);">
      Recent Assessments
    </div>
    <div class="list-stack" id="recent-assessments">
      <!-- populated by JS -->
    </div>
  </div>
</div>

<script>
  (function() {
    // Use student progress mock data (or fallback for different child)
    var progress = window.mockData ? window.mockData.studentProgress : null;
    if (!progress) return;

    // Update header
    var nameEl = document.getElementById('progress-student-name');
    var termEl = document.getElementById('progress-term');
    if (nameEl) nameEl.textContent = progress.studentName;
    if (termEl) termEl.textContent = progress.term;

    // Weekly bar chart
    var chartEl = document.getElementById('weekly-chart');
    var labelsEl = document.getElementById('week-labels');
    var maxScore = Math.max.apply(null, progress.weeklyScores) || 100;

    if (chartEl && labelsEl) {
      var barsHTML = '';
      var labelsHTML = '';
      progress.weeklyScores.forEach(function(score, i) {
        var heightPct = (score / maxScore) * 100;
        barsHTML += '<div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;">' +
          '<div style="width:28px; height:' + heightPct + '%; background-color:var(--color-primary-light); border:1.5px solid var(--color-primary); border-radius:var(--radius-sm) var(--radius-sm) 0 0; min-height:4px;"></div>' +
        '</div>';
        labelsHTML += '<span class="text-xs text-muted" style="flex:1; text-align:center;">W' + (i + 1) + '</span>';
      });
      chartEl.innerHTML = barsHTML;
      labelsEl.innerHTML = labelsHTML;
    }

    // Subject breakdown
    var subEl = document.getElementById('subject-breakdown');
    if (subEl) {
      subEl.innerHTML = progress.subjectBreakdown.map(function(s) {
        var color = s.score >= 75 ? 'var(--color-success)' : s.score >= 50 ? 'var(--color-warning)' : 'var(--color-error)';
        return '<div style="display:flex; align-items:center; gap:var(--space-3);">' +
          '<span class="text-sm" style="width:80px; flex-shrink:0;">' + s.subject + '</span>' +
          '<div class="progress-bar" style="flex:1;">' +
            '<div class="progress-fill" style="width:' + s.score + '%; background-color:' + color + ';"></div>' +
          '</div>' +
          '<span class="text-sm font-semibold" style="width:36px; text-align:right;">' + s.score + '%</span>' +
        '</div>';
      }).join('');
    }

    // Recent assessments
    var recEl = document.getElementById('recent-assessments');
    if (recEl) {
      recEl.innerHTML = progress.recentAssessments.map(function(a) {
        var scoreColor = a.score >= 75 ? 'var(--color-success)' : a.score >= 50 ? 'var(--color-warning)' : 'var(--color-error)';
        return '<div class="list-item">' +
          '<div class="list-item-body">' +
            '<div class="list-item-title">' + a.title + '</div>' +
            '<div class="list-item-subtitle">' + a.date + '</div>' +
          '</div>' +
          '<div class="list-item-trailing">' +
            '<span class="text-sm font-bold" style="color:' + scoreColor + ';">' + a.score + '%</span>' +
            '<a href="#" class="text-xs text-primary" style="margin-left:var(--space-2);">Feedback &rarr;</a>' +
          '</div>' +
        '</div>';
      }).join('');

      // feedback link clicks
      recEl.querySelectorAll('a').forEach(function(link) {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          showToast('Detailed assessment feedback coming soon.', 'info');
        });
      });
    }
  })();
</script>
