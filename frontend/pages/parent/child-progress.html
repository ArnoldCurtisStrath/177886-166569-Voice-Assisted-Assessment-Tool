<!-- VoiceAssess — Student Progress (Parent View) -->
<div class="animate-fade-in">
  <!-- Student selector -->
  <div class="section-header">
    <span class="section-title" id="progress-student-name">Student Progress</span>
  </div>
  <p class="text-xs text-muted" style="margin-top: -12px; margin-bottom: var(--space-5);" id="progress-term">Term 1, 2026</p>

  <!-- Empty state — shown when no assessment data yet -->
  <div class="empty-state" id="progress-empty">
    <div class="empty-state-icon">%</div>
    <h4>No assessment data yet</h4>
    <p>Assessments will appear here once your child's teacher completes evaluations.</p>
  </div>

  <!-- These sections hidden until real data is available -->
  <div id="progress-content" style="display:none;">
    <div class="card" style="margin-bottom: var(--space-5);">
      <div class="text-xs font-semibold text-secondary" style="text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: var(--space-3);">
        Weekly Performance
      </div>
      <div style="display: flex; align-items: flex-end; justify-content: space-between; height: 100px; padding: 0 var(--space-1);" id="weekly-chart"></div>
      <div style="display: flex; justify-content: space-between; margin-top: var(--space-2);" id="week-labels"></div>
    </div>

    <div style="margin-bottom: var(--space-5);" id="subject-breakdown-section"></div>
    <div class="list-stack" id="recent-assessments"></div>
  </div>
</div>

<script>
  (function() {
    // update header from localStorage
    var childId = localStorage.getItem('voiceassess_selected_child');
    var nameEl = document.getElementById('progress-student-name');
    if (nameEl && childId) {
      nameEl.textContent = 'Student ' + childId;
    }

    // assessment data not connected yet — keep empty state visible
  })();
</script>
