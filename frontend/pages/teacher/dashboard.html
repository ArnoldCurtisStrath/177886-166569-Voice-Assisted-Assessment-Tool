<!-- VoiceAssess — Teacher Dashboard -->
<div class="animate-fade-in">
  <!-- Greeting -->
  <h2 style="font-size: var(--text-lg); margin-bottom: var(--space-1);" id="teacher-greeting">Hello, Teacher</h2>
  <p class="text-xs text-muted" style="margin-bottom: var(--space-5);" id="teacher-term">Term 1, 2026</p>

  <!-- Stats Row -->
  <div class="stat-row" style="margin-bottom: var(--space-6);">
    <div class="stat-card">
      <div class="stat-value" id="stat-my-classes">-</div>
      <div class="stat-label">Classes</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-pending">-</div>
      <div class="stat-label">Pending</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-reviewed">-</div>
      <div class="stat-label">Reviewed</div>
    </div>
  </div>

  <!-- My Classes -->
  <div class="section-header">
    <span class="section-title">My Classes</span>
  </div>
  <div class="list-stack" style="margin-bottom: var(--space-6);" id="teacher-classes">
    <!-- Populated from API -->
  </div>
  <div class="empty-state" id="teacher-classes-empty" style="display:none;">
    <div class="empty-state-icon">[</div>
    <h4>No classes assigned</h4>
    <p>Ask your administrator to assign you to a class.</p>
  </div>

  <!-- Bottom Actions -->
  <div style="display: flex; gap: var(--space-3);">
    <a href="#teacher/curate" class="btn btn-primary" style="flex: 2;">+ New Assessment</a>
    <a href="#teacher/review" class="btn btn-secondary" style="flex: 1;">Reviews</a>
  </div>
</div>

<script>
  (function() {
    // greeting from auth
    if (AuthStore.user) {
      var greet = document.getElementById('teacher-greeting');
      if (greet) greet.textContent = 'Hello, ' + AuthStore.user.fullName;
    }

    // load stats
    API.get('/api/teacher/stats')
      .then(function(s) {
        var sv = function(id, val) {
          var el = document.getElementById(id);
          if (el) el.textContent = val;
        };
        sv('stat-my-classes', s.totalClasses);
        sv('stat-pending', s.pendingReviews);
        sv('stat-reviewed', s.reviewedCount);
      })
      .catch(function() {});

    // load classes
    API.get('/api/teacher/classes')
      .then(function(classes) {
        var listEl = document.getElementById('teacher-classes');
        var emptyEl = document.getElementById('teacher-classes-empty');
        if (!classes || classes.length === 0) {
          if (listEl) listEl.innerHTML = '';
          if (emptyEl) emptyEl.style.display = '';
          return;
        }
        if (emptyEl) emptyEl.style.display = 'none';
        if (listEl) {
          listEl.innerHTML = classes.map(function(c) {
            return '<div class="list-item clickable" data-class-id="' + c.classId + '">' +
              '<div class="list-item-body">' +
                '<div class="list-item-title">' + c.displayName + '</div>' +
                '<div class="list-item-subtitle">Grade ' + c.gradeLevel + ' &middot; Stream: ' + c.streamName + '</div>' +
              '</div>' +
              '<div class="list-item-trailing">' +
                '<span class="badge badge-success">Active</span>' +
                '<span class="list-chevron">&#x25B8;</span>' +
              '</div>' +
            '</div>';
          }).join('');

          // click handler
          listEl.querySelectorAll('.list-item').forEach(function(row) {
            row.addEventListener('click', function() {
              showToast('Class grid coming soon.', 'info');
            });
          });
        }
      })
      .catch(function() {});
  })();
</script>
