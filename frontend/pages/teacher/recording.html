<!-- VoiceAssess — Teacher Assessment Recording -->
<div class="animate-fade-in" style="display: flex; flex-direction: column; align-items: center; text-align: center; gap: var(--space-4);">

  <!-- Status Badge -->
  <div style="margin-top: var(--space-2);">
    <span class="badge badge-neutral" id="rec-status-badge">READY</span>
  </div>

  <!-- Microphone Button -->
  <button id="mic-btn" style="
    width: 88px; height: 88px;
    border-radius: var(--radius-full);
    background-color: var(--color-accent);
    color: #FFFFFF;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
    box-shadow: var(--shadow-elevated);
    transition: transform var(--transition-fast), background-color var(--transition-fast);
    margin-top: var(--space-4);
  " aria-label="Start recording">
    <!-- microphone SVG icon -->
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </button>
  <span class="text-xs text-muted" id="mic-label">Tap to Start</span>

  <!-- Waveform Visualization -->
  <div class="waveform" id="waveform" style="margin-top: var(--space-3);">
    <!-- bars generated by JS -->
  </div>

  <!-- Timer -->
  <div class="mono" id="rec-timer" style="font-size: 1.75rem; font-weight: 700; color: var(--color-text);">00:00</div>

  <!-- Mic Status -->
  <div class="text-xs" id="mic-status" style="color: var(--color-success);">&#9679; Microphone: Ready</div>

  <!-- Alternative upload -->
  <p style="margin-top: var(--space-2);">
    <a href="#" id="file-upload-link" class="text-sm text-primary">Or upload existing audio file</a>
  </p>
  <input type="file" id="file-upload-input" accept="audio/*" style="display: none;">

  <!-- Upload Progress (hidden by default) -->
  <div id="upload-progress" style="display: none; width: 100%; margin-top: var(--space-3);">
    <div style="display: flex; justify-content: space-between; margin-bottom: var(--space-1);">
      <span class="text-xs text-secondary">Uploading...</span>
      <span class="text-xs text-secondary" id="upload-percent">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="upload-bar" style="width: 0%;"></div>
    </div>
  </div>

  <!-- Bottom Buttons -->
  <div style="display: flex; gap: var(--space-3); width: 100%; margin-top: auto; padding-top: var(--space-6);">
    <button class="btn btn-secondary btn-block" id="btn-cancel">Cancel</button>
    <button class="btn btn-primary btn-block" id="btn-upload" disabled>Upload &amp; Process</button>
  </div>
</div>

<script>
  (function() {
    var isRecording = false;
    var timerInterval = null;
    var seconds = 0;
    var hasRecording = false;

    var micBtn = document.getElementById('mic-btn');
    var micLabel = document.getElementById('mic-label');
    var timerEl = document.getElementById('rec-timer');
    var statusBadge = document.getElementById('rec-status-badge');
    var micStatus = document.getElementById('mic-status');
    var uploadBtn = document.getElementById('btn-upload');
    var waveformEl = document.getElementById('waveform');

    // build 20 waveform bars (static until recording starts)
    function buildWaveform() {
      if (!waveformEl) return;
      waveformEl.innerHTML = '';
      for (var i = 0; i < 20; i++) {
        var bar = document.createElement('div');
        bar.className = 'waveform-bar';
        bar.style.height = '4px'; // flat when idle
        waveformEl.appendChild(bar);
      }
    }
    buildWaveform();

    // animate waveform bars with random heights
    var waveInterval = null;
    function startWaveAnimation() {
      if (waveInterval) return;
      waveInterval = setInterval(function() {
        var bars = waveformEl ? waveformEl.querySelectorAll('.waveform-bar') : [];
        bars.forEach(function(bar) {
          var h = Math.floor(Math.random() * 50) + 6; // 6-56px
          bar.style.height = h + 'px';
        });
      }, 100);
    }

    function stopWaveAnimation() {
      if (waveInterval) {
        clearInterval(waveInterval);
        waveInterval = null;
      }
      // reset bars to flat
      var bars = waveformEl ? waveformEl.querySelectorAll('.waveform-bar') : [];
      bars.forEach(function(bar) { bar.style.height = '4px'; });
    }

    // format seconds as MM:SS
    function formatTime(sec) {
      var m = Math.floor(sec / 60);
      var s = sec % 60;
      return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    }

    // toggle recording
    micBtn.addEventListener('click', function() {
      if (!isRecording) {
        // start recording
        isRecording = true;
        hasRecording = true;
        micBtn.style.backgroundColor = 'var(--color-error)';
        micLabel.textContent = 'Tap to Stop';
        statusBadge.textContent = 'RECORDING...';
        statusBadge.className = 'badge badge-error';
        micStatus.innerHTML = '&#9679; Microphone: Active';
        micStatus.style.color = 'var(--color-error)';

        // start timer
        seconds = 0;
        timerEl.textContent = formatTime(seconds);
        timerInterval = setInterval(function() {
          seconds++;
          timerEl.textContent = formatTime(seconds);
        }, 1000);

        // start waveform
        startWaveAnimation();

        // enable upload button
        uploadBtn.disabled = false;
      } else {
        // stop recording
        isRecording = false;
        micBtn.style.backgroundColor = 'var(--color-accent)';
        micLabel.textContent = 'Tap to Record Again';
        statusBadge.textContent = 'RECORDING COMPLETE';
        statusBadge.className = 'badge badge-success';
        micStatus.innerHTML = '&#9679; Microphone: Stopped';
        micStatus.style.color = 'var(--color-text-secondary)';

        // stop timer
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }

        // stop waveform
        stopWaveAnimation();
      }
    });

    // cancel button
    document.getElementById('btn-cancel').addEventListener('click', function() {
      if (isRecording) {
        // stop first
        micBtn.click();
      }
      // go back to curation
      Router.navigate('teacher/curate');
    });

    // file upload alternative
    document.getElementById('file-upload-link').addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById('file-upload-input').click();
    });

    document.getElementById('file-upload-input').addEventListener('change', function() {
      if (this.files && this.files.length > 0) {
        hasRecording = true;
        statusBadge.textContent = 'FILE SELECTED';
        statusBadge.className = 'badge badge-primary';
        micStatus.textContent = 'File: ' + this.files[0].name;
        uploadBtn.disabled = false;
      }
    });

    // upload & process button — simulate upload progress
    uploadBtn.addEventListener('click', function() {
      if (!hasRecording) return;

      // disable buttons during upload
      uploadBtn.disabled = true;
      micBtn.style.pointerEvents = 'none';

      statusBadge.textContent = 'UPLOADING...';
      statusBadge.className = 'badge badge-warning';

      var progressEl = document.getElementById('upload-progress');
      var percentEl = document.getElementById('upload-percent');
      var barEl = document.getElementById('upload-bar');

      progressEl.style.display = 'block';
      var progress = 0;

      var uploadInterval = setInterval(function() {
        progress += Math.floor(Math.random() * 15) + 5;
        if (progress > 100) progress = 100;
        barEl.style.width = progress + '%';
        percentEl.textContent = progress + '%';

        if (progress >= 100) {
          clearInterval(uploadInterval);
          statusBadge.textContent = 'PROCESSING...';
          statusBadge.className = 'badge badge-primary';
          showToast('Assessment uploaded successfully! Check pending reviews.', 'success');
          // navigate to review after short delay
          setTimeout(function() {
            Router.navigate('teacher/review');
          }, 1500);
        }
      }, 300);
    });
  })();
</script>
